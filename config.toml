import { useState } from "react";
import { products as initialProducts, Product, formatPrice, categories } from "@/data/products";
import { Pencil, Trash2, Plus, LogIn, X } from "lucide-react";
import { toast } from "sonner";

const ADMIN_PASS = "admin123";

const Admin = () => {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [password, setPassword] = useState("");
  const [productList, setProductList] = useState<Product[]>(initialProducts);
  const [editing, setEditing] = useState<Product | null>(null);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState<Omit<Product, "id">>({
    name: "", description: "", price: 0, image: "", category: "telefonlar", isNew: false, isBestseller: false,
  });

  const handleLogin = (e: React.FormEvent) => {
    e.preventDefault();
    if (password === ADMIN_PASS) {
      setIsLoggedIn(true);
      toast.success("Admin paneliga xush kelibsiz!");
    } else {
      toast.error("Parol noto'g'ri");
    }
  };

  const resetForm = () => {
    setForm({ name: "", description: "", price: 0, image: "", category: "telefonlar", isNew: false, isBestseller: false });
    setEditing(null);
    setShowForm(false);
  };

  const handleSave = (e: React.FormEvent) => {
    e.preventDefault();
    if (!form.name.trim() || !form.image.trim()) {
      toast.error("Nom va rasm majburiy");
      return;
    }
    if (editing) {
      setProductList((prev) => prev.map((p) => p.id === editing.id ? { ...p, ...form } : p));
      toast.success("Mahsulot yangilandi");
    } else {
      const newProduct: Product = { ...form, id: Date.now().toString() };
      setProductList((prev) => [...prev, newProduct]);
      toast.success("Mahsulot qo'shildi");
    }
    resetForm();
  };

  const handleEdit = (product: Product) => {
    setForm({ name: product.name, description: product.description, price: product.price, image: product.image, category: product.category, isNew: product.isNew, isBestseller: product.isBestseller });
    setEditing(product);
    setShowForm(true);
  };

  const handleDelete = (id: string) => {
    setProductList((prev) => prev.filter((p) => p.id !== id));
    toast.success("Mahsulot o'chirildi");
  };

  if (!isLoggedIn) {
    return (
      <div className="min-h-screen pt-24 flex items-center justify-center">
        <form onSubmit={handleLogin} className="glass-card rounded-xl p-8 w-full max-w-sm animate-scale-in">
          <h2 className="font-display text-2xl font-bold text-center mb-6">
            <span className="gradient-text">Admin</span> kirish
          </h2>
          <input
            type="password"
            placeholder="Parolni kiriting"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            className="w-full px-4 py-3 rounded-lg bg-muted border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all mb-4"
          />
          <button
            type="submit"
            className="w-full py-3 rounded-lg font-semibold text-primary-foreground flex items-center justify-center gap-2 transition-all hover:scale-[1.02]"
            style={{ background: "var(--gradient-primary)" }}
          >
            <LogIn className="h-4 w-4" /> Kirish
          </button>
        </form>
      </div>
    );
  }

  return (
    <div className="min-h-screen pt-24 pb-16">
      <div className="container mx-auto px-4">
        <div className="flex items-center justify-between mb-8">
          <h1 className="font-display text-4xl font-bold">
            <span className="gradient-text">Admin</span> panel
          </h1>
          <button
            onClick={() => { setShowForm(true); resetForm(); setShowForm(true); }}
            className="flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-primary-foreground transition-all hover:scale-105"
            style={{ background: "var(--gradient-primary)" }}
          >
            <Plus className="h-4 w-4" /> Yangi mahsulot
          </button>
        </div>

        {/* Form modal */}
        {showForm && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-background/80 backdrop-blur-sm animate-fade-in">
            <form onSubmit={handleSave} className="glass-card rounded-xl p-6 w-full max-w-lg mx-4 animate-scale-in space-y-4">
              <div className="flex items-center justify-between">
                <h3 className="font-display text-xl font-bold">{editing ? "Tahrirlash" : "Yangi mahsulot"}</h3>
                <button type="button" onClick={resetForm} className="p-2 hover:bg-muted rounded-lg transition-colors">
                  <X className="h-5 w-5" />
                </button>
              </div>
              <input placeholder="Nomi" value={form.name} onChange={(e) => setForm(f => ({ ...f, name: e.target.value }))} className="w-full px-4 py-3 rounded-lg bg-muted border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50" />
              <textarea placeholder="Tavsif" value={form.description} onChange={(e) => setForm(f => ({ ...f, description: e.target.value }))} rows={3} className="w-full px-4 py-3 rounded-lg bg-muted border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 resize-none" />
              <input type="number" placeholder="Narx (so'm)" value={form.price || ""} onChange={(e) => setForm(f => ({ ...f, price: Number(e.target.value) }))} className="w-full px-4 py-3 rounded-lg bg-muted border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50" />
              <input placeholder="Rasm URL" value={form.image} onChange={(e) => setForm(f => ({ ...f, image: e.target.value }))} className="w-full px-4 py-3 rounded-lg bg-muted border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50" />
              <select value={form.category} onChange={(e) => setForm(f => ({ ...f, category: e.target.value }))} className="w-full px-4 py-3 rounded-lg bg-muted border border-border text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50">
                {categories.filter(c => c.id !== "all").map(c => (
                  <option key={c.id} value={c.id}>{c.label}</option>
                ))}
              </select>
              <div className="flex gap-4">
                <label className="flex items-center gap-2 text-sm text-muted-foreground">
                  <input type="checkbox" checked={form.isNew || false} onChange={(e) => setForm(f => ({ ...f, isNew: e.target.checked }))} className="rounded" /> Yangi
                </label>
                <label className="flex items-center gap-2 text-sm text-muted-foreground">
                  <input type="checkbox" checked={form.isBestseller || false} onChange={(e) => setForm(f => ({ ...f, isBestseller: e.target.checked }))} className="rounded" /> Bestseller
                </label>
              </div>
              <button type="submit" className="w-full py-3 rounded-lg font-semibold text-primary-foreground transition-all hover:scale-[1.02]" style={{ background: "var(--gradient-primary)" }}>
                {editing ? "Saqlash" : "Qo'shish"}
              </button>
            </form>
          </div>
        )}

        {/* Table */}
        <div className="glass-card rounded-xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-border">
                  <th className="text-left p-4 text-muted-foreground font-medium">Rasm</th>
                  <th className="text-left p-4 text-muted-foreground font-medium">Nomi</th>
                  <th className="text-left p-4 text-muted-foreground font-medium hidden md:table-cell">Kategoriya</th>
                  <th className="text-left p-4 text-muted-foreground font-medium">Narx</th>
                  <th className="text-right p-4 text-muted-foreground font-medium">Amallar</th>
                </tr>
              </thead>
              <tbody>
                {productList.map((p) => (
                  <tr key={p.id} className="border-b border-border/50 hover:bg-muted/30 transition-colors">
                    <td className="p-4">
                      <img src={p.image} alt={p.name} className="w-12 h-12 rounded-lg object-cover" />
                    </td>
                    <td className="p-4 font-medium text-foreground">{p.name}</td>
                    <td className="p-4 text-muted-foreground hidden md:table-cell capitalize">{p.category}</td>
                    <td className="p-4 text-primary font-semibold">{formatPrice(p.price)}</td>
                    <td className="p-4 text-right">
                      <div className="flex justify-end gap-2">
                        <button onClick={() => handleEdit(p)} className="p-2 rounded-lg hover:bg-muted transition-colors text-muted-foreground hover:text-foreground">
                          <Pencil className="h-4 w-4" />
                        </button>
                        <button onClick={() => handleDelete(p.id)} className="p-2 rounded-lg hover:bg-destructive/10 transition-colors text-muted-foreground hover:text-destructive">
                          <Trash2 className="h-4 w-4" />
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

export default Admin;
